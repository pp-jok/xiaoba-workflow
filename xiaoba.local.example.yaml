providers:
  lingzao:
    mode: mock
    skill_root: /absolute/path/to/lingzao
    timeout_seconds: 300

  hot_learning:
    mode: mock
    command: []
    timeout_seconds: 300

  personal_content:
    mode: mock
    workspace: /absolute/path/to/personal-content-workspace

  generation:
    mode: mock
    command: []
    timeout_seconds: 300

features:
  collect_comments_requires_confirmation: true
  collect_transcript_requires_confirmation: true
  auto_publish: false

learning:
  # ask: 采集 note detail 后进入 external_cost_confirmation，等待用户确认
  # always: 默认仍会确认；只有 allow_auto_paid_calls: true 时才自动调用
  # never: 不调用，内部 raw 会记录 skipped
  collect_comments: ask
  collect_transcript: ask
  allow_auto_paid_calls: false
  transcript_required: false
